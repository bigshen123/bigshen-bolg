server:
  port: 8080

spring:
  application:
    name: bigshen-blog

  datasource:
    url: jdbc:h2:file:./data/blogdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: always

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# JWT配置
app:
  jwt:
    secret: Ymlnc2hlbi1ibG9nLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9u
    expiration: 86400000

logging:
  level:
    com.bigshen.blog: DEBUG
    org.springframework.security: INFO

# 文件上传路径
file:
  upload:
    dir: ./uploads
